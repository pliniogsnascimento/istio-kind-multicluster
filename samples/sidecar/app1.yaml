apiVersion: v1
kind: Namespace
metadata:
  name: app1
  labels:
    istio-injection: enabled
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app1
  namespace: app1
---
apiVersion: v1
data:
  index.html: hello from kind-cluster
kind: ConfigMap
metadata:
  name: app1
  namespace: app1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: app1
  name: app1
  namespace: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  strategy: {}
  template:
    metadata:
      labels:
        app: app1
    spec:
      serviceAccountName: app1
      containers:
      - image: nginx
        name: nginx
        resources: {}
        volumeMounts:
        - mountPath: /usr/share/nginx/html
          name: html
      volumes:
      - name: html
        configMap:
          name: app1
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: app1
    istio.io/global: "true"
  name: app1
  namespace: app1
spec:
  ports:
  - port: 80
    protocol: TCP
    targetPort: 80
  selector:
    app: app1
status:
  loadBalancer: {}
